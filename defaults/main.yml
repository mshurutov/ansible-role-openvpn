# defaults file for mshurutov.openvpn
openvpn_files_dir: "{{ role_path }}/files"
openvpn_templates_dir: "{{ role_path }}/templates"
openvpn_vars_dir: "{{ role_path }}/vars"
openvpn_config_dir: "/etc/openvpn"
openvpn_tls_auth_path:
# By default only package "openvpn" is needed for role
openvpn_packages: []
#  - "openvpn"
# OpenVPN can be used in single or multiple instances mode.
# And server and client in same time in multiple instances mode.
# openvpn_server_config and openvpn_client_config are used for single mode;
